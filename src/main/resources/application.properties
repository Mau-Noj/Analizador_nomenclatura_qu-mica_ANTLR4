# ── Servidor ──────────────────────────────────
spring.application.name=quimica-analizador
server.port=8080

# ── CORS — permite peticiones desde el portafolio ──
spring.web.cors.allowed-origins=http://localhost:5173,https://mauricionoj.com

# ── Logs ──────────────────────────────────────
logging.level.com.mauricionoj=DEBUG
logging.level.org.springframework.web=INFO

# ── Respuestas JSON ───────────────────────────
spring.jackson.serialization.indent-output=true